# Cross-compile configuration for `cross` (https://github.com/cross-rs/cross).
# These pre-build steps install the target architecture's ALSA development
# headers inside the cross container so rodio/cpal can link successfully.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install --assume-yes libasound2-dev:$CROSS_DEB_ARCH"
]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install --assume-yes libasound2-dev:$CROSS_DEB_ARCH"
]
