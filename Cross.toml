# Cross-compile configuration for `cross` (https://github.com/cross-rs/cross).
#
# `cross` 0.2.5 (last tagged release) uses ubuntu:16.04 as the base image for
# the ARM Linux targets, which ships clang 3.8 and FFmpeg 2.8 — both too old
# for current bindgen / ffmpeg-sys-next. The `:main`-tagged images are built
# from cross-rs's main branch on a current Ubuntu base (clang ≥ 14, FFmpeg
# ≥ 4.4), which is what we need.
#
# Each pre-build step installs the target architecture's ALSA + FFmpeg + SDL2
# dev headers via Debian multi-arch, plus clang/libclang for bindgen.

[build.env]
# `cross` strips environment variables by default; forward the bindgen /
# pkg-config plumbing we set in CI so ffmpeg-sys-next can locate target-arch
# headers and .pc files.
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS",
    "BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_linux_gnu",
    "BINDGEN_EXTRA_CLANG_ARGS_armv7_unknown_linux_gnueabihf",
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install --assume-yes libc6-dev:$CROSS_DEB_ARCH linux-libc-dev:$CROSS_DEB_ARCH libasound2-dev:$CROSS_DEB_ARCH libavcodec-dev:$CROSS_DEB_ARCH libavformat-dev:$CROSS_DEB_ARCH libavutil-dev:$CROSS_DEB_ARCH libswresample-dev:$CROSS_DEB_ARCH libswscale-dev:$CROSS_DEB_ARCH libsdl2-dev:$CROSS_DEB_ARCH pkg-config clang libclang-dev",
    # ffmpeg-sys-next compiles a small `check.c` with the HOST (x86_64) compiler,
    # but pkg-config injects -I/usr/include/aarch64-linux-gnu from FFmpeg's
    # Cflags. Recent glibc made the arm64 <bits/math-vector.h> declare
    # aarch64-only GCC vector types (__Float32x4_t, SVE __SVFloat32_t, ...) that
    # the x86_64 compiler can't parse, so that host compile fails. The header
    # only provides *optional* vectorized libm variants; replace it with the
    # generic no-SIMD stub (empty __DECL_SIMD_* macros) so both the host check
    # and the real aarch64 build compile. `math.h` still works unchanged.
    "echo '#include <bits/libm-simd-decl-stubs.h>' > /usr/include/aarch64-linux-gnu/bits/math-vector.h"
]

[target.armv7-unknown-linux-gnueabihf]
image = "ghcr.io/cross-rs/armv7-unknown-linux-gnueabihf:main"
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install --assume-yes libc6-dev:$CROSS_DEB_ARCH linux-libc-dev:$CROSS_DEB_ARCH libasound2-dev:$CROSS_DEB_ARCH libavcodec-dev:$CROSS_DEB_ARCH libavformat-dev:$CROSS_DEB_ARCH libavutil-dev:$CROSS_DEB_ARCH libswresample-dev:$CROSS_DEB_ARCH libswscale-dev:$CROSS_DEB_ARCH libsdl2-dev:$CROSS_DEB_ARCH pkg-config clang libclang-dev",
    # ffmpeg-sys-next builds a small `check.c` for the HOST arch (x86_64) but
    # pkg-config feeds it -I/usr/include/arm-linux-gnueabihf from the FFmpeg
    # Cflags. That pulls the armhf gnu/stubs.h into a host compile, which then
    # wants gnu/stubs-soft.h (armhf packages only ship stubs-hard.h, since
    # armhf is hard-float by definition). stubs-*.h files are near-empty
    # marker headers, so dropping an empty placeholder is enough to unblock
    # the host compile; the real cross compile uses the armhf gcc which picks
    # stubs-hard.h via __ARM_PCS_VFP and ignores the empty file.
    "mkdir -p /usr/include/arm-linux-gnueabihf/gnu && touch /usr/include/arm-linux-gnueabihf/gnu/stubs-soft.h"
]
