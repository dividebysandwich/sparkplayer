name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86_64: native build, .zip + .deb
  # ---------------------------------------------------------------------------
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-gnu
      SUFFIX: linux-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Install ALSA + FFmpeg + SDL2 development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev \
            libsdl2-dev \
            pkg-config clang libclang-dev

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.TARGET }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ env.TARGET }}

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        run: cargo deb --no-build -p sparkplayer-native --target ${{ env.TARGET }}

      - name: Stage zip archive
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          STAGE="sparkplayer-${VERSION}-${SUFFIX}"
          mkdir -p "${STAGE}"
          cp "target/${TARGET}/release/sparkplayer" "${STAGE}/"
          cp README.md "${STAGE}/" || true
          zip -9r "${STAGE}.zip" "${STAGE}"
          echo "ZIP=${STAGE}.zip" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SUFFIX }}
          path: |
            ${{ env.ZIP }}
            target/${{ env.TARGET }}/debian/*.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux ARM (Raspberry Pi): cross-compiled .zip + .deb for aarch64 and armv7
  # ---------------------------------------------------------------------------
  linux-cross:
    name: Linux ${{ matrix.suffix }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            suffix: linux-aarch64
          - target: armv7-unknown-linux-gnueabihf
            suffix: linux-armv7
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --locked

      - name: Build release binary with cross
        env:
          # pkg-config refuses to look up cross-arch .pc files without this.
          PKG_CONFIG_ALLOW_CROSS: "1"
          # Tell bindgen which arch we are targeting so it loads the right
          # libavutil/avconfig.h from /usr/include/<triple>/.
          BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_linux_gnu: "--target=aarch64-linux-gnu -I/usr/include/aarch64-linux-gnu"
          BINDGEN_EXTRA_CLANG_ARGS_armv7_unknown_linux_gnueabihf: "--target=arm-linux-gnueabihf -I/usr/include/arm-linux-gnueabihf"
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        # --no-strip: skip host `strip` (it cannot operate on a foreign binary)
        run: cargo deb --no-build --no-strip -p sparkplayer-native --target ${{ matrix.target }}

      - name: Stage zip archive
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          STAGE="sparkplayer-${VERSION}-${{ matrix.suffix }}"
          mkdir -p "${STAGE}"
          cp "target/${{ matrix.target }}/release/sparkplayer" "${STAGE}/"
          cp README.md "${STAGE}/" || true
          zip -9r "${STAGE}.zip" "${STAGE}"
          echo "ZIP=${STAGE}.zip" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: |
            ${{ env.ZIP }}
            target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows x86_64: native build, .zip + .msi
  # ---------------------------------------------------------------------------
  windows-x86_64:
    name: Windows x86_64
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-msvc
      SUFFIX: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.TARGET }}

      - name: Install FFmpeg (shared dev build)
        shell: pwsh
        run: |
          # Prebuilt FFmpeg shared dev build from gyan.dev (LGPL).
          # ffmpeg-sys-next looks for $FFMPEG_DIR/include and $FFMPEG_DIR/lib.
          $url = 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full-shared.7z'
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.7z -UseBasicParsing
          7z x ffmpeg.7z -offmpeg-dist -y | Out-Null
          $root = (Get-ChildItem ffmpeg-dist -Directory | Select-Object -First 1).FullName
          echo "FFMPEG_DIR=$root" >> $env:GITHUB_ENV
          # libclang is needed by bindgen (used by ffmpeg-sys-next).
          # GitHub's windows-latest image ships LLVM under C:\Program Files\LLVM.
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          # The MSI installer + runtime need the FFmpeg DLLs on PATH; copy them
          # next to the binary after build.
          echo "FFMPEG_BIN=$root\bin" >> $env:GITHUB_ENV

      - name: Install SDL2 (VC dev libraries)
        shell: pwsh
        run: |
          # Prebuilt SDL2 development libraries for MSVC. sdl2-sys (no `bundled`
          # feature) emits a plain `link-lib=SDL2`, so the linker just needs
          # SDL2.lib on the LIB search path; the .zip/MSI need SDL2.dll at runtime.
          $url = 'https://github.com/libsdl-org/SDL/releases/download/release-2.32.4/SDL2-devel-2.32.4-VC.zip'
          Invoke-WebRequest -Uri $url -OutFile sdl2.zip -UseBasicParsing
          Expand-Archive -Path sdl2.zip -DestinationPath sdl2-dist -Force
          $root = (Get-ChildItem sdl2-dist -Directory | Select-Object -First 1).FullName
          # Prepend the x64 lib dir to LIB so link.exe finds SDL2.lib.
          echo "LIB=$root\lib\x64;$env:LIB" >> $env:GITHUB_ENV
          # SDL2.dll lives alongside the .lib files; stage it next to the binary.
          echo "SDL2_BIN=$root\lib\x64" >> $env:GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --locked --target ${{ env.TARGET }}

      - name: Stage FFmpeg DLLs next to the binary
        shell: pwsh
        run: |
          # ffmpeg-release-full-shared ships LGPL-licensed shared libs; place
          # them alongside sparkplayer.exe so the .zip and MSI are runnable on
          # systems without FFmpeg installed.
          Copy-Item "$env:FFMPEG_BIN\*.dll" "target/$env:TARGET/release/" -Force
          # SDL2.dll likewise needs to ship next to the binary.
          Copy-Item "$env:SDL2_BIN\SDL2.dll" "target/$env:TARGET/release/" -Force

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Initialize WiX template
        # The generated wix/main.wxs is not committed; regenerate per build.
        run: cargo wix init -p sparkplayer-native --force

      - name: Build MSI installer
        run: cargo wix -p sparkplayer-native --no-build --nocapture --target ${{ env.TARGET }} --output target/wix

      - name: Stage zip archive
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { 'dev' }
          $stage = "sparkplayer-$version-$env:SUFFIX"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/$env:TARGET/release/sparkplayer.exe" "$stage/"
          Copy-Item "target/$env:TARGET/release/*.dll" "$stage/" -ErrorAction SilentlyContinue
          if (Test-Path README.md) { Copy-Item README.md "$stage/" }
          Compress-Archive -Path "$stage/*" -DestinationPath "$stage.zip" -Force
          echo "ZIP=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SUFFIX }}
          path: |
            ${{ env.ZIP }}
            target/wix/*.msi
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish a GitHub Release with all artifacts when a v* tag is pushed.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - linux-x86_64
      - linux-cross
      - windows-x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.zip" -o -name "*.deb" -o -name "*.msi" \) \
            -exec cp -v {} release/ \;
          ls -la release

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
